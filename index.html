<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inflación de fichajes</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
        
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  </head>

  <body>

    <script src="https://app.protobject.com/framework/p.js"></script>
    <script src="config.js"></script>


    
    <div id="panel-info">
        <div id="foto-jugador"></div>
        <div class="texto-info">
            <div id="info-fecha" class="fecha"></div>
            <div id="info-nombre" class="nombre"></div>
            <div id="info-clubes" class="clubes"></div>
            <div id="info-precio-original" class="precio-original"></div>
            <div id="info-precio" class="precio"></div>
            <div id="info-contexto" class="contexto"></div>
        </div>
    </div>



    <script>
        async function grafico_fichajes() {
          const llamado_datos = await fetch('./datos-fichajes.json');
          const datos = await llamado_datos.json();

          let prev_target;

          Protobject.Core.onReceived(function(tilt) {
            console.log(tilt);
            switch(true){
              case(isinrange(tilt, 0, 8.57) || isinrange(tilt, 351.43, 360)):
                target = 0;
                break;
              case(isinrange(tilt, 8.57, 25.71)):
                target = 1;
                break;
              case(isinrange(tilt, 25.71, 42.85)):
                target = 2;
                break;
              case(isinrange(tilt, 42.85, 59.99)):
                target = 3;
                break;
                
              default:
                target = 0;
                break;
            }
                


            if (prev_target!=target){
              console.log[target];
              prev_target = target;
              actualizarPanel(datos[target]);
            }
            
          });
        }


        function isinrange(x, y, z){
          if (y<x && x<z){
            return true;
          } else {
            return false;
          };
        };


        function actualizarPanel(jugador) {
            const nombreLimpio = jugador.jugador.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');

            document.getElementById('panel-info').style.opacity = 1;
            document.getElementById('info-fecha').innerText = `Fecha del traspaso: ${jugador.fecha_texto}`;
            document.getElementById('info-nombre').innerText = jugador.jugador;
            document.getElementById('info-clubes').innerText = `${jugador.ultimo_club} ➜ ${jugador.nuevo_club}`;
            document.getElementById('info-precio-original').innerHTML = `<span class="label-precio">Costo Original</span> ${jugador.coste} M€`;
            document.getElementById('info-precio').innerHTML = `<span class="label-precio">Ajustado a Hoy</span> ${jugador.precio_ajustado} M€`;
            document.getElementById('info-contexto').innerText = jugador.contexto || '';

            let archivoFoto = '';
            <!-- con estos tuve problems asi q los deje harcodeados no mas -->
            if (nombreLimpio.includes('conti')) {
                archivoFoto = 'conti.jpg';
            } else if (nombreLimpio.includes('nazario')) {
                archivoFoto = 'ronaldo.webp';
            } else if (nombreLimpio.includes('figo')) {
                archivoFoto = 'figo.webp';
            } else if (nombreLimpio.includes('cristiano')) {
                archivoFoto = 'cristiano.webp';
            } else if (nombreLimpio.includes('denilson')) {
                archivoFoto = 'denilson.webp';
            } else if (nombreLimpio.includes('neymar')) {
                archivoFoto = 'neymar.webp';
            } else {
                const apellido = nombreLimpio.split(' ').pop();
                archivoFoto = `${apellido}.webp`;
            }

            document.getElementById('foto-jugador').style.backgroundImage = `url('img/${archivoFoto}')`;
        }









        grafico_fichajes();
    </script>
    

    
  </body>



  
</html>
