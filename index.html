<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inflación de fichajes</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
        
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
  </head>

  <body>

    <script src="https://app.protobject.com/framework/p.js"></script>
    <script src="config.js"></script>


    
    <div id="panel-info">
        <div id="foto-jugador"></div>
        <div class="texto-info">
            <div id="info-fecha" class="fecha"></div>
            <div id="info-nombre" class="nombre"></div>
            <div id="info-clubes" class="clubes"></div>
            <div id="info-precio-original" class="precio-original"></div>
            <div id="info-precio" class="precio"></div>
            <div id="info-contexto" class="contexto"></div>
        </div>
    </div>
    <div>
      <canvas id="timeline" width="1360" height="160"></canvas>
    </div>


    <script>
        async function grafico_fichajes(line) {
          const llamado_datos = await fetch('./datos-fichajes.json');
          let datos = await llamado_datos.json();

          const sfx = new Tone.Synth({
            oscillator: {
              type: "sine"
            },
            envelope: {
              attack: 0,
              decay: 0.1,
              sustain: 0.8,
              release: 0
            },
            volume: -6
          }).toDestination();
          let prev_target;

          for(let i=0; i<21; i++){
            let ff = datos[i].fecha_fichaje;
            ff = ff.split("/");
            ff = ff[1] + "/" + ff[0] + "/" + ff[2];
            datos[i].fecha_fichaje = ff;
          };

          let st_angle;

          Protobject.Core.onReceived(function(rel_tilt) {

            if (!st_angle){
              st_angle = rel_tilt;
            };

            let tilt = (rel_tilt+(360-st_angle))%360;


            console.log(tilt);
            switch(true){
              case(isinrange(tilt, 0, 6.57) || isinrange(tilt, 353.43, 360)):
                target = 20;
                break;
              case(isinrange(tilt, 10.57, 23.71)):
                target = 19;
                break;
              case(isinrange(tilt, 27.71, 40.85)):
                target = 18;
                break;
              case(isinrange(tilt, 44.85, 57.99)):
                target = 17;
                break;
              case(isinrange(tilt, 61.99, 75.13)):
                target = 16;
                break;
              case(isinrange(tilt, 79.13, 92.27)):
                target = 15;
                break;
              case(isinrange(tilt, 96.27, 109.41)):
                target = 14;
                break;
              case(isinrange(tilt, 113.41, 126.55)):
                target = 13;
                break;
              case(isinrange(tilt, 130.55, 143.99)):
                target = 12;
                break;
              case(isinrange(tilt, 147.99, 160.83)):
                target = 11;
                break;
              case(isinrange(tilt, 164.83, 177.97)):
                target = 10;
                break;
              case(isinrange(tilt, 181.97, 195.11)):
                target = 9;
                break;
              case(isinrange(tilt, 199.11, 212.25)):
                target = 8;
                break;
              case(isinrange(tilt, 216.25, 229.39)):
                target = 7;
                break;
              case(isinrange(tilt, 233.39, 246.53)):
                target = 6;
                break;
              case(isinrange(tilt, 250.53, 263.67)):
                target = 5;
                break;
              case(isinrange(tilt, 267.67, 280.81)):
                target = 4;
                break;
              case(isinrange(tilt, 284.81, 297.95)):
                target = 3;
                break;
              case(isinrange(tilt, 301.95, 315.09)):
                target = 2;
                break;
              case(isinrange(tilt, 319.09, 332.23)):
                target = 1;
                break;
              case(isinrange(tilt, 336.23, 349.37)):
                target = 0;
                break;
              default:
                target = -1;
                break;
            }
            

            // aquí se visualiza y reproduce sonido
            if ((target != prev_target) && (target != -1)){
              console.log(target);
              prev_target = target;
              line.clearRect(0, 0, 1360, 55);
              line.font = "20px Arial";
              line.fillText("↓", (55 + (20-target)*(1240/20)), 25);
              actualizarPanel(datos[target]);
              playSFX(sfx, (parseFloat(datos[target].precio_ajustado) / parseFloat(datos[20].precio_ajustado)));
            };
          });
        }


        function isinrange(x, y, z){
          if (y<x && x<z){
            return true;
          } else {
            return false;
          };
        };


        function actualizarPanel(jugador) {
            const nombreLimpio = jugador.jugador.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');

            document.getElementById('panel-info').style.opacity = 1;
            document.getElementById('info-fecha').innerText = `Fecha del traspaso: ${jugador.fecha_fichaje}`;
            document.getElementById('info-nombre').innerText = jugador.jugador;
            document.getElementById('info-clubes').innerText = `${jugador.ultimo_club} ➜ ${jugador.nuevo_club}`;
            document.getElementById('info-precio-original').innerHTML = `<span class="label-precio">Costo Original</span> ${jugador.coste} M€`;
            document.getElementById('info-precio').innerHTML = `<span class="label-precio">Ajustado a Hoy</span> ${jugador.precio_ajustado} M€`;
            document.getElementById('info-contexto').innerText = jugador.contexto || '';

            let archivoFoto = '';
            <!-- con estos tuve problems asi q los deje harcodeados no mas -->
            if (nombreLimpio.includes('conti')) {
                archivoFoto = 'conti.jpg';
            } else if (nombreLimpio.includes('nazario')) {
                archivoFoto = 'ronaldo.webp';
            } else if (nombreLimpio.includes('figo')) {
                archivoFoto = 'figo.webp';
            } else if (nombreLimpio.includes('cristiano')) {
                archivoFoto = 'cristiano.webp';
            } else if (nombreLimpio.includes('denilson')) {
                archivoFoto = 'denilson.webp';
            } else if (nombreLimpio.includes('neymar')) {
                archivoFoto = 'neymar.webp';
            } else {
                const apellido = nombreLimpio.split(' ').pop();
                archivoFoto = `${apellido}.webp`;
            }

            document.getElementById('foto-jugador').style.backgroundImage = `url('img/${archivoFoto}')`;
        }


        async function playSFX(synth, frec_factor) {
          await Tone.start();

          const min_frec = 180;
          const base_frec = 110;

          const frec = base_frec*frec_factor + min_frec;

          synth.triggerAttackRelease(frec, "0.2")
        }






        //proceso de inicio -------------------------------------------

        const tl = document.getElementById("timeline");
        const tl_ctx = tl.getContext("2d");
        tl_ctx.font = "14px Arial";
        tl_ctx.fillStyle = "white";

        tl_ctx.beginPath();
        tl_ctx.moveTo(60, 100);
        tl_ctx.lineTo(1300, 100);
        let yeararray = [
          "2017",
          "2016",
          "2013",
          "2009",
          "2001",
          "2000",
          "2000",
          "1999",
          "1998",
          "1997",
          "1997",
          "1992",
          "1990",
          "1988",
          "1987",
          "1986",
          "1982",
          "1981",
          "1979",
          "1978",
          "1956"
        ];
        yeararray.reverse();
        
        for(let l=0; l<21; l++){
          tl_ctx.moveTo((60 + l*(1240/20)), 50);
          tl_ctx.lineTo((60 + l*(1240/20)), 100);
          tl_ctx.fillText(yeararray[l], (46 + l*(1240/20)), 120);
        };

        tl_ctx.lineWidth = 4;
        tl_ctx.strokeStyle = "rgba(200, 200, 200, 0.4)";

        tl_ctx.stroke();



        grafico_fichajes(tl_ctx);
    </script>
    

    
  </body>



  
</html>
